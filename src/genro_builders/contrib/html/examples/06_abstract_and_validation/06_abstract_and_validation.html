<head>
  <title>Validation Demo</title>
  <style>
      body { font-family: sans-serif; max-width: 600px; margin: 2em auto; }
      table { border-collapse: collapse; width: 100%; margin: 1em 0; }
      th, td { padding: 0.5em; border: 1px solid #ddd; text-align: left; }
      th { background: #f0f4f8; }
      code { background: #fee; padding: 0.2em 0.4em; border-radius: 3px; }
  </style>
</head>
<body>
  <h1>HTML5 Structural Validation</h1>
  <p>HtmlBuilder enforces W3C nesting rules. Valid structures work:</p>
  <ul>
    <li>Item 1</li>
    <li>Item 2</li>
  </ul>
  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Value</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Alpha</td>
        <td>100</td>
      </tr>
    </tbody>
  </table>
  <section>
    <h2>Section Title</h2>
    <p>Section content.</p>
  </section>
</body>
